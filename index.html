<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ek Sawaal 💌</title>
<style>
  :root{
    --blush-1:#ffe4ec;
    --blush-2:#ffc9d9;
    --rose:#e85c7b;
    --rose-deep:#c33a63;
    --plum:#5c2340;
    --cream:#fff8f4;
    --gold:#e8a94c;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{
    font-family:'Segoe UI', system-ui, sans-serif;
    background:radial-gradient(circle at 30% 20%, var(--blush-1), var(--blush-2) 60%, #ffb3c9 100%);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    touch-action:manipulation;
  }

  /* floating hearts background */
  .heart-field{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }
  .bg-heart{
    position:absolute;
    bottom:-40px;
    color:var(--rose);
    opacity:.55;
    animation:floatUp linear infinite;
    filter:drop-shadow(0 2px 3px rgba(200,50,90,.25));
  }
  @keyframes floatUp{
    0%{transform:translateY(0) rotate(0deg);opacity:0;}
    10%{opacity:.6;}
    90%{opacity:.5;}
    100%{transform:translateY(-115vh) rotate(25deg);opacity:0;}
  }

  .stage{
    position:relative;
    width:min(420px, 94vw);
    height:min(680px, 90vh);
    height:min(680px, 90dvh);
    z-index:2;
  }

  .card{
    position:absolute;
    inset:0;
    background:linear-gradient(160deg, var(--cream), #fff);
    border-radius:28px;
    box-shadow:0 25px 60px -15px rgba(180,40,80,.35), 0 0 0 1px rgba(255,255,255,.6) inset;
    padding:44px 30px 36px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    justify-content:center;
    gap:22px;
    opacity:0;
    transform:translateX(40px) scale(.97);
